<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumen Showcase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --font-body:'Space Grotesk',system-ui,-apple-system,sans-serif;
    --font-mono:'JetBrains Mono','SF Mono',Consolas,monospace;
    --bg:#0a1f33; --surface:#0f2a44; --surface2:#143553;
    --border:rgba(130,190,235,.14); --border-bright:rgba(130,190,235,.30);
    --grid:rgba(120,180,225,.06); --grid-bold:rgba(120,180,225,.10);
    --text:#e3eef8; --text-dim:#8fa9c2;
    --accent:#ff7a5c; --accent-dim:rgba(255,122,92,.12);
    --cyan:#6fc6ff; --cyan-dim:rgba(111,198,255,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:var(--font-body); color:var(--text); background-color:var(--bg);
    background-image:
      linear-gradient(var(--grid) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid) 1px,transparent 1px),
      linear-gradient(var(--grid-bold) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid-bold) 1px,transparent 1px);
    background-size:28px 28px,28px 28px,140px 140px,140px 140px;
    display:flex; flex-direction:column; overflow:hidden;
  }
  header{
    padding:20px 28px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px; flex-shrink:0;
  }
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);}
  h1{font-size:1.4rem;font-weight:600;letter-spacing:-.5px;}
  h1 em{font-style:normal;color:var(--accent);}
  .layout{display:flex;flex:1;overflow:hidden;}
  aside{
    width:280px;min-width:280px; border-right:1px solid var(--border);
    overflow-y:auto; padding:16px 0; flex-shrink:0;
  }
  aside h3{
    font-family:var(--font-mono);font-size:10px;letter-spacing:2px;
    text-transform:uppercase;color:var(--text-dim);padding:8px 20px;
  }
  .item{
    display:block; padding:10px 20px; cursor:pointer;
    color:var(--text-dim); font-size:14px; line-height:1.4;
    transition:background .15s, color .15s; border:none; background:none;
    text-align:left; width:100%;
  }
  .item:hover{color:var(--text);background:var(--surface);}
  .item.active{color:var(--cyan);background:var(--cyan-dim);border-right:2px solid var(--cyan);}
  main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .viewer{flex:1;padding:16px;display:flex;align-items:center;justify-content:center;}
  .viewer iframe{width:100%;height:100%;border:none;border-radius:8px;background:#000;}
  .empty{color:var(--text-dim);font-family:var(--font-mono);font-size:14px;}
  footer{
    border-top:1px solid var(--border);padding:12px 28px;
    font-family:var(--font-mono);font-size:12px;color:var(--text-dim);flex-shrink:0;
  }
  footer a{color:var(--cyan);text-decoration:none;}
  @media(max-width:768px){
    .layout{flex-direction:column;}
    aside{width:100%;min-width:unset;border-right:none;border-bottom:1px solid var(--border);}
    main{height:50vh;}
  }
</style>
</head>
<body>
<header>
  <span class="eyebrow">lumen</span>
  <h1>Showcase <em>gallery</em></h1>
</header>
<div class="layout">
  <aside>
    <h3>Showcases</h3>
    <button class="item active" onclick="show('wayfinder-ecosystem.html',this)">Wayfinder Ecosystem</button>
    <button class="item" onclick="show('navigator-strategy.html',this)">Navigator Strategy</button>
    <button class="item" onclick="show('prototype-skill.html',this)">Prototype Skill</button>
    <button class="item" onclick="show('research-skill.html',this)">Research Skill</button>
  </aside>
  <main>
    <div class="viewer">
      <iframe id="viewer" src="wayfinder-ecosystem.html" loading="lazy"></iframe>
    </div>
  </main>
</div>
<footer>
  Source: <a href="https://github.com/zosmaai/lumen-showcase" target="_blank">github.com/zosmaai/lumen-showcase</a> ·
  Generated with lumen skill suite · GitHub Pages
</footer>
<script>
function show(path, el){
  document.getElementById('viewer').src = path;
  document.querySelectorAll('.item').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
</script>
</body>
</html>
