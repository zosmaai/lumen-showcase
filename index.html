<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumen Showcase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --font-body:'Space Grotesk',system-ui,-apple-system,sans-serif;
    --font-mono:'JetBrains Mono','SF Mono',Consolas,monospace;
    --bg:#0a1f33; --surface:#0f2a44; --surface2:#143553;
    --border:rgba(130,190,235,.14); --border-bright:rgba(130,190,235,.30);
    --grid:rgba(120,180,225,.06); --grid-bold:rgba(120,180,225,.10);
    --text:#e3eef8; --text-dim:#8fa9c2;
    --accent:#ff7a5c; --accent-dim:rgba(255,122,92,.12);
    --cyan:#6fc6ff; --cyan-dim:rgba(111,198,255,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:var(--font-body); color:var(--text); background-color:var(--bg);
    background-image:
      linear-gradient(var(--grid) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid) 1px,transparent 1px),
      linear-gradient(var(--grid-bold) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid-bold) 1px,transparent 1px);
    background-size:28px 28px,28px 28px,140px 140px,140px 140px;
    min-height:100vh; padding:clamp(36px,7vw,96px) clamp(24px,7vw,120px);
  }
  .wrap{max-width:1040px;margin:0 auto;}
  .eyebrow{font-family:var(--font-mono);font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);margin-bottom:18px;}
  h1{font-size:clamp(38px,7vw,76px);font-weight:600;letter-spacing:-2px;line-height:1;}
  h1 em{font-style:normal;color:var(--accent);}
  .lede{font-size:clamp(16px,2.2vw,21px);color:var(--text-dim);line-height:1.6;max-width:62ch;margin-top:22px;}
  .lede code{font-family:var(--font-mono);font-size:.86em;background:var(--cyan-dim);color:var(--cyan);padding:1px 6px;border-radius:3px;}
  .search-wrap{margin-top:clamp(22px,4vw,42px);}
  .search-input{
    width:100%; padding:14px 18px 14px 44px;
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    color:var(--text); font-family:var(--font-body); font-size:16px;
    outline:none; transition:border-color .2s;
  }
  .search-input:focus{border-color:var(--border-bright);}
  .search-input::placeholder{color:var(--text-dim);}
  .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:18px;pointer-events:none;}
  .search-pos{position:relative;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:22px;margin-top:clamp(34px,5vw,56px);}
  a.card{
    display:flex;flex-direction:column;text-decoration:none;color:inherit;
    background:var(--surface);border:1px solid var(--border);border-radius:16px;
    padding:clamp(22px,3vw,34px);transition:border-color .2s,transform .2s,background .2s;position:relative;overflow:hidden;
  }
  a.card:hover{border-color:var(--border-bright);transform:translateY(-3px);background:var(--surface2);}
  a.card::after{content:'\2197';position:absolute;top:22px;right:24px;font-size:22px;color:var(--text-dim);transition:color .2s,transform .2s;}
  a.card:hover::after{color:var(--accent);transform:translate(2px,-2px);}
  .kind{font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:5px;align-self:flex-start;margin-bottom:18px;}
  .kind.deck{background:var(--accent-dim);color:var(--accent);}
  .card h2{font-size:clamp(21px,2.6vw,27px);font-weight:600;letter-spacing:-.5px;line-height:1.15;}
  .card .date{font-family:var(--font-mono);font-size:11.5px;color:var(--accent);margin-top:4px;}
  .meta{font-family:var(--font-mono);font-size:11.5px;color:var(--text-dim);margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;}
  .meta span{border:1px solid var(--border);border-radius:4px;padding:3px 8px;}
  .no-results{color:var(--text-dim);font-family:var(--font-mono);font-size:14px;text-align:center;padding:40px 0;display:none;}
  .pagination{display:flex;gap:8px;margin-top:32px;justify-content:center;flex-wrap:wrap;}
  .page-btn{
    font-family:var(--font-mono);font-size:13px;padding:6px 14px;
    background:var(--surface);border:1px solid var(--border);border-radius:6px;
    color:var(--text-dim);cursor:pointer;transition:background .15s,color .15s;
  }
  .page-btn:hover{color:var(--text);background:var(--surface2);}
  .page-btn.active{color:var(--cyan);background:var(--cyan-dim);border-color:var(--cyan);}
  .page-btn:disabled{opacity:.3;cursor:default;}
  .count{font-family:var(--font-mono);font-size:13px;color:var(--text-dim);text-align:center;margin-top:16px;}
  footer{margin-top:clamp(40px,6vw,72px);font-family:var(--font-mono);font-size:13px;color:var(--text-dim);line-height:1.8;border-top:1px solid var(--border);padding-top:24px;}
  footer a{color:var(--cyan);text-decoration:none;}
  footer a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">lumen · showcase gallery</p>
  <h1>Single-file <em>visual docs</em></h1>
  <p class="lede">AI-generated, fully self-contained HTML presentations. Auto-discovered from the repository.</p>

  <div class="search-wrap">
    <div class="search-pos">
      <span class="search-icon">⌕</span>
      <input class="search-input" type="text" id="search" placeholder="Search showcases..." autocomplete="off">
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <p class="no-results" id="no-results">No matching showcases.</p>
  <p class="count" id="count"></p>
  <div class="pagination" id="pagination"></div>

  <footer>
    Source: <a href="https://github.com/zosmaai/lumen-showcase">github.com/zosmaai/lumen-showcase</a><br>
    Generated with lumen skill suite · rendered via GitHub Pages.
  </footer>
</div>
<script>
const grid = document.getElementById('grid');
const searchInput = document.getElementById('search');
const noResults = document.getElementById('no-results');
const countEl = document.getElementById('count');
const paginationEl = document.getElementById('pagination');
let allItems = [];
const PAGE_SIZE = 20;
let page = 1;

function matches(s, q) {
  return s.title.toLowerCase().includes(q) || s.file.toLowerCase().includes(q);
}

function filtered() {
  const q = searchInput.value.toLowerCase().trim();
  return q ? allItems.filter(s => matches(s, q)) : [...allItems];
}

function render() {
  const results = filtered();
  const total = results.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  page = Math.min(page, Math.max(1, totalPages));
  const start = (page - 1) * PAGE_SIZE;
  const slice = results.slice(start, start + PAGE_SIZE);

  grid.innerHTML = '';
  slice.forEach(s => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = s.file;
    card.innerHTML = `
      <span class="kind deck">Deck</span>
      <h2>${s.title}</h2>
      <span class="date">${s.date}</span>
      <div class="meta"><span>${s.file}</span></div>
    `;
    grid.appendChild(card);
  });

  noResults.style.display = total === 0 ? 'block' : 'none';
  const end = Math.min(start + PAGE_SIZE, total);
  countEl.textContent = total ? `Showing ${start + 1}–${end} of ${total}` : '';

  paginationEl.innerHTML = '';
  if (totalPages <= 1) return;

  const prev = document.createElement('button');
  prev.className = 'page-btn';
  prev.textContent = '←';
  prev.disabled = page === 1;
  prev.onclick = () => { page--; render(); };
  paginationEl.appendChild(prev);

  for (let i = 1; i <= totalPages; i++) {
    const btn = document.createElement('button');
    btn.className = 'page-btn' + (i === page ? ' active' : '');
    btn.textContent = i;
    btn.onclick = () => { page = i; render(); };
    paginationEl.appendChild(btn);
  }

  const next = document.createElement('button');
  next.className = 'page-btn';
  next.textContent = '→';
  next.disabled = page === totalPages;
  next.onclick = () => { page++; render(); };
  paginationEl.appendChild(next);
}

async function init() {
  try {
    const res = await fetch('showcases.json');
    allItems = await res.json();
  } catch(e) {
    console.error('Failed to load showcase index', e);
    return;
  }
  searchInput.addEventListener('input', () => { page = 1; render(); });
  render();
}

init();
</script>
</body>
</html>
